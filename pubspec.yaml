name: tabibak
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter
  build_runner: ^2.4.10
  dio: ^5.4.3+1
  flutter_bloc: ^8.1.6
  freezed: ^2.5.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  json_serializable: ^6.8.0
  retrofit: ^4.1.0
  retrofit_generator: ^8.1.0
  shared_preferences: ^2.3.2
  get_it: ^7.7.0
  pretty_dio_logger: ^1.4.0
  supabase_flutter: ^2.9.1
  flutter_dotenv: ^5.2.1
  flutter_riverpod: ^2.6.1
  google_nav_bar: ^5.0.7
  flutter_gen: ^5.9.0
  flutter_svg: ^2.2.0
  flutter_screenutil: ^5.9.3
  device_preview: ^1.2.0
  cached_network_image: ^3.4.1
  easy_localization: ^3.0.7+1
  image_picker: ^1.1.2
  pinput: ^5.0.1
  google_sign_in: ^6.3.0
  shimmer_animation: ^2.2.2
  logger: ^2.6.0
  flutter_native_splash: ^2.4.7
  cupertino_icons: ^1.0.8
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_logo.png"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/fonts/
    - assets/icons/
    - assets/images/
    - assets/images/onboarding/
    - assets/langs/

  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
        - asset: assets/fonts/Tajawal-Light.ttf
          weight: 300
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_24pt-Regular.ttf
        - asset: assets/fonts/Inter_24pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter_24pt-Bold.ttf
          weight: 700